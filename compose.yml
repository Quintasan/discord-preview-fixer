version: '3'
services:
  bot:
    image: ghcr.io/quintasan/discord-preview-fixer:v1.3.7
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DISCORD_PREVIEW_FIXER_TOKEN:
      SENTRY_DSN:
      SENTRY_ENVIRONMENT:
      SENTRY_RELEASE: v1.3.7
      DISCORDRB_NONACL: true # makes it shut up about missign libsodium
    restart: unless-stopped